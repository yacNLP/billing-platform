name: revenueops-platform

services:
  api:
    build:
      context: ./backend/billing-service
    container_name: revenueops-api
    environment:
      DATABASE_URL: postgresql://admin:admin@postgres:5432/revenueops?schema=public
      SHADOW_DATABASE_URL: postgresql://admin:admin@postgres:5432/revenueops_shadow?schema=shadow
      PORT: 3000
      JWT_SECRET: dev-secret
      CORS_ORIGIN: http://localhost:3001,http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_started
    command: >
      sh -c "
      npx prisma migrate deploy &&
      node dist/src/main.js
      "
    restart: unless-stopped

  postgres:
    image: postgres:15
    container_name: revenueops-postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: revenueops
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  postgres-test:
    image: postgres:16
    container_name: revenueops-postgres-test
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: revenueops_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d revenueops_test"]
      interval: 5s
      timeout: 5s
      retries: 5
